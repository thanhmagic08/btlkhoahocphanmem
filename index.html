<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Trang Đăng Nhập - Hệ Thống Đặt Lịch</title>
  <style>
    body{font-family:Inter,Segoe UI,Roboto, sans-serif;background:#f6f9fc;margin:0;display:flex;align-items:center;justify-content:center;height:100vh}
    .card{background:#fff;padding:32px;border-radius:12px;box-shadow:0 6px 20px rgba(2,18,33,0.08);width:360px}
    h1{margin:0 0 8px;font-size:20px;color:#0f172a}
    p{margin:0 0 20px;color:#475569}
    label{display:block;font-size:13px;color:#475569;margin-bottom:6px}
    input[type="text"],input[type="password"]{width:100%;padding:10px;border-radius:8px;border:1px solid #e6eef8;margin-bottom:12px}
    .btn{display:inline-block;width:100%;padding:10px;border-radius:8px;background:#1E90FF;color:#fff;border:none;cursor:pointer;font-weight:600}
    .small{font-size:13px;color:#64748b;margin-top:10px;text-align:center}
  </style>
</head>
<body>
  <div class="card">
    <h1>Đăng nhập</h1>
    <p>Đăng nhập để tiếp tục tới hệ thống đặt lịch khám bệnh.</p>

    <form id="loginForm">
      <label for="email">Email</label>
      <input id="email" type="text" placeholder="you@example.com" required>

      <label for="password">Mật khẩu</label>
      <input id="password" type="password" placeholder="••••••" required>

      <button class="btn" type="submit">Đăng nhập</button>
    </form>

    <div class="small">Nếu bạn chạy ứng dụng Streamlit local, trang sẽ chuyển tới <strong>http://localhost:8501</strong>.</div>
  </div>

  <script>
    // Thay đổi targetUrl nếu app Streamlit được deploy trên URL khác.
    const targetUrl = new URLSearchParams(window.location.search).get('target') || 'http://localhost:8501';

    document.getElementById('loginForm').addEventListener('submit', function(e){
      e.preventDefault();
      // Ở đây chúng ta giả lập đăng nhập; nếu cần có thể kiểm tra email/password.
      window.location.href = targetUrl;
    });
  </script>
</body>
</html>
